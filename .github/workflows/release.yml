name: release

on:
  push:
    tags: ["v*"]

jobs:
  build-images:
    runs-on: ${{ matrix.runner.label }}
    strategy:
      matrix:
        runner:
          - { arch: amd64, label: ubuntu-24.04 }
          - { arch: arm64, label: ubuntu-24.04-arm }
    outputs:
      amd64_tag: ${{ steps.save.outputs.amd64_tag }}
      arm64_tag: ${{ steps.save.outputs.arm64_tag }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for image
        uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: type=ref,event=tag,suffix=-${{ matrix.runner.arch }}
          flavor: latest=false

      - name: Extract qBittorrent version from tag
        id: qbt_version
        run: echo release=$(grep -oP '(?<=^v)\d+\.\d+\.\d+' <<< "${{ github.ref_name }}") >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          provenance: false
          platforms: linux/${{ matrix.runner.arch }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            QBT_VERSION=${{ steps.qbt_version.outputs.release }}

      - name: Save image tag
        id: save
        run: echo "${{ matrix.runner.arch }}_tag=${{ fromJSON(steps.meta.outputs.json).tags[0] }}" >> "$GITHUB_OUTPUT"

  merge-images:
    runs-on: ubuntu-24.04
    needs:
      - build-images
    steps:
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for image
        uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: type=ref,event=tag
          flavor: latest=true

      - name: Merge manifests and push
        run: |
          docker buildx imagetools create --tag $(jq -cr '.tags | join(" --tag ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
          ${{ join(needs.build-images.outputs.*, ' ') }}

      - name: Inspect final image
        run: docker buildx imagetools inspect ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
